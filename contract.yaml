# contract.yaml — approved goal contract
kind: goal
name: dev.sh hardening — reviewer-guard in CI + claim-count coherence (v0.32.0 retro)
slug: devsh-hardening
risk: R1

scope:
  may_touch:
    - scripts/dev.sh                 # fold reviewer-guard into step 6; add step 7 (claim-count coherence)
    - docs/loop-harness.md           # "six → seven deterministic checks" description
    - CHANGELOG.md
    - VERSION
    - working/                       # gitignored one-shot verifier
  must_not_touch:
    - "scripts/reviewer-guard.sh internals"   # ship it as-is; only ADD it to the CI net
    - "BEHAVIOURAL-CLAIMS.md claim content"    # step 7 READS it; the count stays 4/5, untouched
    - "skills/**"                              # no charter change — tooling only

action: >
  Close the two v0.32.0-retro gaps. (1) Fold scripts/reviewer-guard.sh into dev.sh step 6's
  "shared executables fail closed" net so its --self-test is CI-gated like verifier-lib + ledger.
  (2) Add step 7 — behavioural-claim count coherence: compute the M/N verified-live count FROM the
  registry (BEHAVIOURAL-CLAIMS.md claim headings) and assert the literal appears identically in the
  backlog AND docs/loop-harness.md, so a count update can't half-land. Renumber checks /6 -> /7;
  update the docs "six -> seven deterministic checks" description. Tooling hardening only — no charter
  or behavioural change.

stop:
  verdict: PASS
  evidence: required
  check: "bash working/devsh-hardening-verify.sh && bash scripts/dev.sh verify"

verifier:
  independent: false
  mechanism: "working/ verifier (step 7 fn + reviewer-guard wired into step 6 + /7 renumber + docs 'seven' + the count check FIRES: computes 4/5 from the registry and passes) + dev.sh verify 7/7 + residuals R1"

decision_log:
  - "Source: corroboration-rigor retro improvements #1 (single-source the N/M backlog count) and #2 (wire reviewer-guard.sh into dev.sh step 6). Both were explicitly held out of v0.32.0 as out-of-scope; this PATCH closes them."
  - "Design: step 7 COMPUTES the count from the registry (grep claim headings) rather than hard-coding it, so the check is a true single-source — it fails if BEHAVIOURAL-CLAIMS.md prose, docs prose, OR the registry itself drift apart. This is stronger than asserting a fixed '4/5' literal."
  - "Red-team (Phase 6): a check that only asserted '4/5' appears would pass forever even after the real count changed. Computing expected from the registry means the check can FAIL when it should — proving it is not a check-that-can't-fail (the agent-review-panel control-validation discipline applied to our own tooling)."
  - "R1 PATCH: edits dev.sh (the CI gate) but only ADDITIVELY (stricter, never looser); no charter, no matcher semantics, no claim relabel. The count stays 4/5 (claim #5 still unverified)."
