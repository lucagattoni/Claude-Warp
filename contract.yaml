# contract.yaml — approved goal contract
kind: goal
name: Close the md_has _italic_/soft-wrap gap in verifier-lib.sh (boundary-aware underscore stripping)
slug: md-has-italic-gap
risk: R2

scope:
  may_touch:
    - scripts/verifier-lib.sh                         # md_normalize: strip single-underscore emphasis, boundary-aware; flip the KNOWN-GAP self-test
    - docs/loop-harness.md                            # update the verifier-lib doc (gap now closed)
    - CHANGELOG.md
    - VERSION
    - working/md-has-italic-gap-verify.sh             # independent verifier (gitignored scratch)
  must_not_touch:
    - "the has() raw-grep matcher (unchanged idiom) — only md_normalize/md_has behaviour changes"
    - "snake_case + __dunder__ preservation — these MUST still survive normalization (regression guard)"
    - "any per-PR verifier under working/ — they keep working unchanged (strictly more permissive)"

action: >
  Make md_normalize strip SINGLE-underscore `_italic_` emphasis markers in a boundary-aware way — a `_`
  is stripped only when it is NOT flanked by alphanumerics on both sides (so emphasis delimiters go but
  snake_case `must_not_touch` and `__dunder__`/`mcp__tool__` runs are preserved). Update the two
  KNOWN-GAP self-test asserts to expect md_has now FINDS an underscore-split phrase, and add a
  regression assert that dunders survive. Raw has() is untouched.

budget:
  loop_max_usd: 0
  step_max_budget_usd: 2
  max_turns: 30

stop:
  verdict: PASS
  evidence: required
  check: "bash working/md-has-italic-gap-verify.sh && bash scripts/verifier-lib.sh --self-test && bash scripts/dev.sh verify"

verifier:
  independent: true
  mechanism: >
    working/md-has-italic-gap-verify.sh — builds its OWN fixtures (a phrase split by _italic_ emphasis,
    a snake_case token, a __dunder__/mcp__ token, a true-negative) and asserts md_has behaviour through
    the public function, independent of the in-lib self-test. PLUS verifier-lib --self-test (behavioural
    spec) green and dev.sh verify 6/6. Non-regression was confirmed against the (now-merged) honesty-riders
    verifier: all 22 of its prose/rider assertions still passed under the new md_normalize; only its
    hard-coded VERSION==0.28.0 pin flipped (correctly, since this PATCH bumps to 0.28.1). That one-shot
    verifier was then pruned per the merged-PR scratch convention.

surface_conditions:
  - "Direct-fix vs opt-in md_has_loose — RESOLVED (direct boundary-aware fix; opt-in perpetuates author-must-remember, the very tax the retro flagged). Not user-blocking; recorded here."

escalation:
  after_attempts: 3

decision_log:
  - "kind=goal not harness: one focused change to one library function + its self-test/docs."
  - "R2 not R1: verifier-lib is the matcher every merge-gating verifier sources; a false-positive regression here could pass a merge that should fail. Independent verifier with its own fixtures required."
  - "Direct fix to md_has, NOT a new opt-in md_has_loose (retro's suggestion): opt-in repeats the 'author must remember' fragility the retro itself criticised. Boundary-aware stripping is monotonically more permissive on emphasis only — it cannot break a currently-passing assertion, and snake_case/dunders are provably preserved by the both-sides-alnum rule."
  - "PATCH (v0.28.1): repairs a documented limitation (the KNOWN GAP) — a bug fix to a component, not a new capability."
