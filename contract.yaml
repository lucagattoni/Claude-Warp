# contract.yaml — approved goal contract
kind: goal
name: Add a not_has absence-assert helper to verifier-lib.sh
slug: verifier-lib-not-has
risk: R1

scope:
  may_touch:
    - scripts/verifier-lib.sh        # add not_has() + a self-test case
    - docs/loop-harness.md           # add not_has to the helper enumeration
    - CHANGELOG.md
    - VERSION
    - working/                       # gitignored one-shot verifier
  must_not_touch:
    - skills/                        # no merge-gating skill logic
    - "has()/md_has()/chk() semantics"   # additive only — do not alter existing matchers

action: >
  Add not_has <pat> <file> to scripts/verifier-lib.sh — the inverse of has, echoing rc 0 when the
  pattern is ABSENT and rc 1 when present, so it composes with chk exactly like has/md_has. Add a
  --self-test case proving 0-on-absent / 1-on-present and chk composition; add a not_has bullet to
  the docs helper list; CHANGELOG + VERSION (PATCH).

stop:
  verdict: PASS
  evidence: required
  check: "bash scripts/verifier-lib.sh --self-test && bash working/verifier-lib-not-has-verify.sh && bash scripts/dev.sh verify"

verifier:
  independent: false                 # R1 dev-tooling; self-test + working verifier are the gate
  mechanism: "verifier-lib --self-test (now incl. not_has cases) + working/ behavioural verifier + dev.sh verify 6/6 + check-ai-residuals --risk R1"

decision_log:
  - "not_has formalizes the inline `[ \"$(has …)\" -ne 0 ] && echo 0 || echo 1` idiom repeated ~6x in the self-test and rolled by hand in the v0.31.1 D2 verifier — a shared absence-assert, not new capability."
  - "Red-team (Phase 6): a presence-only verifier (grep -q 'not_has' lib) would TRIVIALLY PASS even if not_has were broken. The working verifier and the --self-test case therefore assert BEHAVIOUR — not_has echoes 0 on an absent pattern, 1 on a present one, and a chk built on it flips VL_PASS correctly — a check an empty stub cannot pass."
  - "Implemented as the literal inverse of has (grep -qiE; invert rc) so over a missing file — where grep finds nothing — not_has reports ABSENT=0. Documented as the one wrinkle: not_has over a missing file passes (the pattern is trivially absent); use has/md_has fail-closed when presence is what matters."
  - "R1 not R2: additive change to dev-only, non-merge-gating tooling; existing has/md_has/chk semantics untouched (regression-guarded by the unchanged self-test cases). PATCH per the SemVer rule (a dev-tooling component addition)."
