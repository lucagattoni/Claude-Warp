# contract.yaml — approved goal contract
kind: goal
name: Encode the md_has pattern-authoring rule in verifier-lib.sh (retro #2)
slug: mdhas-pattern-guard
risk: R1

scope:
  may_touch:
    - scripts/verifier-lib.sh         # header note near md_has + two new --self-test guard cases
    - CHANGELOG.md
    - VERSION
    - working/                        # gitignored one-shot verifier
  must_not_touch:
    - "has/md_has/not_has/chk runtime SEMANTICS"   # comment + test only; no behaviour change
    - md_normalize                                  # the normalizer logic is correct and unchanged
    - BEHAVIOURAL-CLAIMS.md            # the backlog is closed at 4/4; this batch does not touch it

action: >
  Encode the recurring md_has pattern-authoring rule where verifier-authors read it: a `.` placeholder
  for a backtick md_normalize already STRIPS silently fails the match. Add a ⚠ note to the verifier-lib
  header (surfaced by --help) and TWO --self-test guard cases — the normalized literal matches; the
  `.`-placeholder pattern must NOT — without changing has/md_has/not_has/chk semantics. This closes the
  D4-retro #2 improvement (the trap cost first-run FAILs in several consecutive batches).

stop:
  verdict: PASS
  evidence: required
  check: "bash working/mdhas-pattern-guard-verify.sh && bash scripts/verifier-lib.sh --self-test && bash scripts/dev.sh verify"

verifier:
  independent: false
  mechanism: "working/ verifier (asserts the header note + both guard self-test cases + CHANGELOG/VERSION) + verifier-lib --self-test (proves the guard fires) + dev.sh verify 6/6 + residuals R1"

decision_log:
  - "Source: D4 retro improvement #2 — the `.`-for-a-stripped-backtick slip cost first-run verifier FAILs in three consecutive batches (D3, twice in D4). The lesson lived only in RETRO.md; nothing put it where a verifier-author hits it BEFORE writing patterns. Fix = a header note (rendered by --help) + a live self-test guard, so the rule is enforced, not just documented."
  - "Scope discipline: comment + test ONLY. md_normalize and the has/md_has/not_has/chk matchers are unchanged — the self-test still passes its existing 0–7 cases, and the two new case-8 asserts prove the literal matches while the placeholder fails. No behavioural drift to any existing verifier."
  - "Red-team (Phase 6): a presence-only check ('the note exists') would pass even if the guard didn't fire. The working verifier instead asserts the self-test PASSES (so the guard's placeholder-FAILS assertion actually held) AND that the case-8 lines exist — behaviour, not mere presence."
  - "R1 PATCH: a doc + test change to a non-merge-gating helper; the backlog stays closed at 4/4 (untouched). User chose this (option A) and to pause at the milestone after."
