# contract.yaml — approved goal contract
kind: goal
name: Correct the /converge claim (#3) + live D3 dogfood of its real behaviour
slug: dogfood-converge-d3
risk: R1

scope:
  may_touch:
    - BEHAVIOURAL-CLAIMS.md           # rewrite claim #3 to the state-reconciler framing + add Dogfood D3
    - tests/dogfood/                  # add the converge partial-satisfaction fixture + RUNBOOK step
    - docs/loop-harness.md            # note the D3 run + the claim-#3 correction
    - CHANGELOG.md
    - VERSION
    - working/                        # gitignored one-shot verifier
  must_not_touch:
    - skills/claude-warp-converge     # the SKILL is correct; the BACKLOG was wrong — do not edit the skill
    - "claim #4 (reproduction-required)"   # genuinely two-pass; deferred, not in scope
    - "scripts/verifier-lib.sh has/md_has/chk/not_has semantics"

action: >
  Correct claim #3 in BEHAVIOURAL-CLAIMS.md — /converge reconciles ACTUAL REPO STATE vs CONTRACT
  INTENT and classifies gaps (missing/partial/contradicts/unrequested), it does NOT reconcile two
  reviewer verdicts (the prior framing was wrong per skills/claude-warp-converge/SKILL.md:3) — then
  run a live D3 dogfood: spawn an independent reasoning-blind agent to /converge a partial-satisfaction
  fixture (stop.check passes, a must_not_touch path violated, a may_touch intent item missing) and flip
  #3 to verified-live ONLY if it honestly classifies contradicts + missing and refuses to declare
  converged. Record the negative honestly if it does not.

stop:
  verdict: PASS
  evidence: required
  check: "bash working/dogfood-converge-d3-verify.sh && bash scripts/verifier-lib.sh --self-test && bash scripts/dev.sh verify"

verifier:
  independent: false                  # R1; the LIVE D3 agent IS the independent pass being recorded
  mechanism: "working/ verifier (asserts the correction landed + the D3 catches are recorded) + verifier-lib --self-test + dev.sh verify 6/6 + check-ai-residuals --risk R1"

decision_log:
  - "DISCOVERY via the Phase-2 honesty-gate read: claim #3 described /converge as reconciling 'two reviewer passes that disagree' — factually wrong. SKILL.md:3 says it reconciles repo-state vs contract-intent and classifies gaps. The whole 'spawn 2 divergent reviewers' plan was invalid; correcting the claim is the honest deliverable, and dogfooding the REAL mechanism is the valid live test."
  - "Honesty (don't silently overwrite): the backlog records that the prior framing was a mischaracterization caught by the D3 gate, rather than quietly swapping the text — the correction itself is evidence the gate works. Historical D1/D2 log entries are left intact (record of what was believed then); only the forward-looking claim-#3 section is corrected, with a Correction note."
  - "Fixture design (genuine judgment split, not the broken fixture): a self-contained mini-repo under tests/dogfood/converge-fixture/ where (a) stop.check passes (src/api/health.js exists), (b) a must_not_touch path is violated (src/db/ modified), (c) a may_touch intent item is missing (docs/api.md absent). A naive reconciler says 'stop.check green -> converged'; the correct one surfaces contradicts + missing. Hint-stripped per the D2 contamination guard."
  - "Red-team (Phase 6): the verifier must assert the LIVE catch fired (agent named contradicts + missing AND did not declare converged), not merely that a D3 heading exists — a presence-only check would pass even if the agent had rubber-stamped. not_has guards that no answer-leak tags remain in the fixture. If the agent does NOT fire, #3 stays unverified and the verifier asserts the status still reads unverified — the flip is gated on the honest result."
  - "R1: edits a tracked evidence doc + adds tracked fixtures; /converge is read-only of source; no merge-gating skill touched. PATCH (evidence + a doc-correctness fix)."
