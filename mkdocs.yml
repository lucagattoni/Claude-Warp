site_name: ClaudeWarp
site_description: The loop harness for Claude Code — scaffold, guard, and schedule autonomous tasks in any project.
site_url: https://lucagattoni.github.io/Claude-Warp/
site_author: Luca Gattoni
copyright: ClaudeWarp — the loop harness for Claude Code

repo_url: https://github.com/lucagattoni/Claude-Warp
repo_name: lucagattoni/Claude-Warp
edit_uri: edit/main/docs/

# docs/ is the source; the README stays the GitHub repo landing and links here.
docs_dir: docs

# Make broken internal links/anchors fail the build (with --strict in CI).
# Absolute links (intentional github.com refs to repo files) are left alone.
validation:
  omitted_files: warn
  absolute_links: ignore
  unrecognized_links: warn
  links:
    anchors: warn

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    # Light
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    # Left column — collapsible nav
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    # Right column — on-this-page TOC (kept separate, NOT integrated, so it stays a 3rd column)
    - toc.follow
    # Search + code ergonomics
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/external-links.css

extra_javascript:
  - javascripts/external-links.js
  - javascripts/section-numbering.js

# Left navigation tree — Diátaxis order: tutorial → explanation → how-to → reference.
# Chapters and sub-chapters are numbered for easy reference (as in Claude-Loops).
nav:
  - Home: index.md
  - 1. Getting Started:
      - 1.1 Quickstart: quickstart.md
      - 1.2 Concepts: concepts.md
      - 1.3 Install: install.md
      - 1.4 Goal Readiness: goal-readiness.md
  - 2. Guides:
      - 2.1 Scaffolding: guides/scaffolding.md
      - 2.2 Scheduling: guides/scheduling.md
      - 2.3 Deployment: guides/deployment.md
      - 2.4 Monitoring: guides/monitoring.md
      - 2.5 Iterating: guides/iterating.md
  - 3. Reference:
      - 3.1 ClaudeWarp vs Native: reference/comparison.md
      - 3.2 Skills: reference/skills.md
      - 3.3 Templates: reference/templates.md
      - 3.4 Architecture: reference/architecture.md
      - 3.5 Developing: reference/developing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lucagattoni/Claude-Warp
