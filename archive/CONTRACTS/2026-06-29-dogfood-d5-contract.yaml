  - "R1 PATCH (evidence-only): no charter, matcher, or tooling change; the fixture is reused unchanged; claims #1-#4 untouched. P6 honesty held: pass-1 was a constructed input, only pass-2 (the mechanism) was the live agent; cross-vendor remains a future, weaker-until-proven claim."
